<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض | لوحة تحكم فورجلاين</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<header class="admin-header">
  <div class="container admin-header-top">
    <div class="admin-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      لوحة تحكم المالك
    </div>
    <div class="admin-header-actions">
      <a href="../index.html" class="admin-btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        العودة للموقع
      </a>
      <button class="admin-btn-ghost" id="adminLogoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        خروج
      </button>
    </div>
  </div>
  <nav class="admin-tabs container">
    <a href="dashboard.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      الإحصائيات
    </a>
    <a href="orders.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      الطلبات
    </a>
    <a href="products.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      المنتجات
    </a>
    <a href="offers.html" class="admin-tab active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      العروض
    </a>
  </nav>
</header>

<main class="container admin-main">

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="admin-page-head-row">
      <div>
        <h1>العروض</h1>
        <p class="text-faint">إنشاء وإدارة العروض الترويجية</p>
      </div>
    </div>

    <button class="add-new-btn" id="addOfferBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      إنشاء عرض جديد
    </button>

    <div id="offersGrid" class="offer-cards-grid"></div>
    <p class="empty-note" id="offersEmptyNote" style="display:none;">لا توجد عروض بعد — اضغط "إنشاء عرض جديد" للبدء</p>
  </div>

  <!-- EDITOR VIEW -->
  <div id="editorView" style="display:none;">
    <a href="#" id="backToList" class="breadcrumb" style="text-decoration:none; cursor:pointer;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      العودة لقائمة العروض
    </a>

    <div class="admin-page-head">
      <h1 id="editorTitle">إنشاء عرض جديد</h1>
    </div>

    <form class="panel admin-form-panel" id="offerForm">
      <input type="hidden" id="offerId">

      <div class="field-row">
        <div class="field">
          <label>عنوان العرض (عربي) <span class="req">*</span></label>
          <input type="text" id="fTitleAr" placeholder="مثال: تخفيض على البروتين">
        </div>
        <div class="field">
          <label>عنوان العرض (فرنسي)</label>
          <input type="text" id="fTitleFr" placeholder="ex: Promo Protéine">
        </div>
      </div>

      <div class="field">
        <label>المنتج المرتبط بالعرض <span class="req">*</span></label>
        <select id="fProductId">
          <option value="">اختر منتجاً...</option>
        </select>
      </div>

      <div class="field-row">
        <div class="field">
          <label>نسبة الخصم % <span class="req">*</span></label>
          <input type="number" id="fDiscount" min="1" max="99" placeholder="مثال: 15">
        </div>
        <div class="field"></div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>تاريخ البداية <span class="req">*</span></label>
          <input type="date" id="fStart">
        </div>
        <div class="field">
          <label>تاريخ النهاية <span class="req">*</span></label>
          <input type="date" id="fEnd">
        </div>
      </div>

      <div class="field">
        <label>صورة العرض (البانر)</label>
        <input type="file" id="fOfferImageFile" accept="image/*">
        <p class="text-faint" style="font-size:11.5px; margin-top:6px;">اختر صورة بانر للعرض من جهازك (اختياري — لو فارغة هتستخدم صورة المنتج)</p>
        <div id="offerImagePreview" style="width:100%;max-width:360px;height:130px;border-radius:10px;overflow:hidden;background:var(--navy-50);margin-top:10px;border:1px solid var(--silver-200);"></div>
        <input type="hidden" id="fOfferImageCurrentUrl">
      </div>

      <div class="field-error-msg" id="formError" style="display:none; margin-bottom:14px;"></div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          حفظ العرض
        </button>
        <button type="button" class="btn btn-outline" id="cancelEditBtn">إلغاء</button>
      </div>
    </form>
  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/cloudinary-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/admin-offers.js"></script>
</body>
</html>
