<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات | لوحة تحكم فورجلاين</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- ============================================================
     ADMIN HEADER + TABS
     ============================================================ -->
<header class="admin-header">
  <div class="container admin-header-top">
    <div class="admin-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      لوحة تحكم المالك
    </div>
    <div class="admin-header-actions">
      <a href="../index.html" class="admin-btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        العودة للموقع
      </a>
      <button class="admin-btn-ghost" id="adminLogoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        خروج
      </button>
    </div>
  </div>
  <nav class="admin-tabs container">
    <a href="dashboard.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      الإحصائيات
    </a>
    <a href="orders.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      الطلبات
    </a>
    <a href="products.html" class="admin-tab active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      المنتجات
    </a>
    <a href="offers.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      العروض
    </a>
  </nav>
</header>

<main class="container admin-main">

  <!-- ============================================================
       LIST VIEW
       ============================================================ -->
  <div id="listView">
    <div class="admin-page-head-row">
      <div>
        <h1>المنتجات</h1>
        <p class="text-faint" id="productsCount">0 منتج</p>
      </div>
    </div>

    <button class="add-new-btn" id="addProductBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      إضافة منتج جديد
    </button>

    <div id="productsList"></div>
    <p class="empty-note" id="productsEmptyNote" style="display:none;">لا توجد منتجات بعد</p>
  </div>

  <!-- ============================================================
       EDITOR VIEW (add / edit)
       ============================================================ -->
  <div id="editorView" style="display:none;">
    <a href="#" id="backToList" class="breadcrumb" style="text-decoration:none; cursor:pointer;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      العودة لقائمة المنتجات
    </a>

    <div class="admin-page-head">
      <h1 id="editorTitle">إضافة منتج جديد</h1>
    </div>

    <form class="panel admin-form-panel" id="productForm">
      <input type="hidden" id="productId">

      <div class="field-row">
        <div class="field">
          <label>اسم المنتج (عربي) <span class="req">*</span></label>
          <input type="text" id="fName_ar">
        </div>
        <div class="field">
          <label>اسم المنتج (فرنسي)</label>
          <input type="text" id="fName_fr">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>الماركة <span class="req">*</span></label>
          <input type="text" id="fBrand" placeholder="مثال: Optimum Nutrition">
        </div>
        <div class="field">
          <label>الفئة <span class="req">*</span></label>
          <select id="fCategory">
            <option value="protein">بروتين</option>
            <option value="preworkout">قوة وطاقة</option>
            <option value="creatine">كرياتين</option>
            <option value="vitamins">فيتامينات ومعادن</option>
            <option value="mass">ضخامة عضلية</option>
            <option value="aminos">أحماض أمينية</option>
            <option value="fatburn">حوارق الدهون</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>السعر (د.ج) <span class="req">*</span></label>
          <input type="number" id="fPrice" min="0" step="1">
        </div>
        <div class="field">
          <label>السعر قبل الخصم (اختياري)</label>
          <input type="number" id="fOldPrice" min="0" step="1">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>الكمية بالمخزون <span class="req">*</span></label>
          <input type="number" id="fStock" min="0" step="1">
        </div>
        <div class="field">
          <label>حد تنبيه المخزون المنخفض</label>
          <input type="number" id="fLowStockAt" min="0" step="1" placeholder="5">
        </div>
      </div>

      <div class="field">
        <label>رابط الصورة الرئيسية <span class="req">*</span></label>
        <input type="text" id="fImage" placeholder="https://...">
      </div>

      <div class="field">
        <label>صور إضافية (روابط مفصولة بفاصلة , — اختياري)</label>
        <input type="text" id="fExtraImages" placeholder="https://...jpg, https://...jpg">
      </div>

      <div class="field-row">
        <div class="field">
          <label>الوصف (عربي)</label>
          <textarea id="fDesc_ar" rows="3"></textarea>
        </div>
        <div class="field">
          <label>الوصف (فرنسي)</label>
          <textarea id="fDesc_fr" rows="3"></textarea>
        </div>
      </div>

      <div class="checkbox-row">
        <label class="checkbox-field">
          <input type="checkbox" id="fBest">
          الأكثر مبيعاً
        </label>
        <label class="checkbox-field">
          <input type="checkbox" id="fNew">
          وصل حديثاً
        </label>
      </div>

      <div class="field-error-msg" id="formError" style="display:none; margin-bottom:14px;"></div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          حفظ المنتج
        </button>
        <button type="button" class="btn btn-outline" id="cancelEditBtn">إلغاء</button>
      </div>
    </form>
  </div>

</main>

<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/admin-products.js"></script>
</body>
</html>
