<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإحصائيات | لوحة تحكم فورجلاين</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- ============================================================
     ADMIN HEADER + TABS
     ============================================================ -->
<header class="admin-header">
  <div class="container admin-header-top">
    <div class="admin-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      لوحة تحكم المالك
    </div>
    <div class="admin-header-actions">
      <a href="../index.html" class="admin-btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        العودة للموقع
      </a>
      <button class="admin-btn-ghost" id="adminLogoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        خروج
      </button>
    </div>
  </div>
  <nav class="admin-tabs container">
    <a href="dashboard.html" class="admin-tab active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      الإحصائيات
    </a>
    <a href="orders.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      الطلبات
    </a>
    <a href="products.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      المنتجات
    </a>
    <a href="offers.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      العروض
    </a>
    <a href="categories.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>
      الفئات
    </a>
    <a href="settings.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      الإعدادات
    </a>
  </nav>
</header>

<main class="container admin-main">
  <div class="admin-page-head">
    <h1>نظرة عامة</h1>
    <p class="text-faint">ملخص أداء المتجر والطلبات</p>
  </div>

  <!-- ORDER STATUS STAT CARDS -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-card-top">
        <span>طلبات جديدة</span>
        <span class="stat-icon" style="background:#1E5BFF1A; color:#1E5BFF;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
      </div>
      <div class="stat-value" id="statNew">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <span>طلبات مؤكدة</span>
        <span class="stat-icon" style="background:#1E7A4C1A; color:#1E7A4C;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </span>
      </div>
      <div class="stat-value" id="statConfirmed">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <span>طلبات مشحونة</span>
        <span class="stat-icon" style="background:#B7791F1A; color:#B7791F;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/></svg>
        </span>
      </div>
      <div class="stat-value" id="statShipped">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <span>طلبات ملغاة</span>
        <span class="stat-icon" style="background:#B3261E1A; color:#B3261E;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </span>
      </div>
      <div class="stat-value" id="statCancelled">0</div>
    </div>
  </div>

  <!-- MONTH SALES -->
  <div class="panel" style="margin-bottom:24px;">
    <p class="text-faint" style="font-size:12.5px; font-weight:700; margin-bottom:6px;">مبيعات هذا الشهر</p>
    <div class="big-number" id="monthSales">0 <small>د.ج</small></div>
  </div>

  <div class="dash-two-col">
    <!-- TOP PRODUCTS -->
    <div class="panel">
      <h3 class="panel-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        الأكثر طلباً
      </h3>
      <div id="topProductsList"></div>
    </div>

    <!-- LOW STOCK ALERT -->
    <div class="panel panel-warning">
      <h3 class="panel-title" style="color:var(--warning);">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        تنبيه: مخزون منخفض
      </h3>
      <p class="text-faint" style="font-size:12.5px; margin-bottom:16px;">منتجات وصلت لحد إعادة الطلب</p>
      <div id="lowStockList"></div>
    </div>
  </div>
</main>

<!-- Firebase SDK (نسخة compat — تعمل مباشرة بدون أدوات بناء) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/admin-dashboard.js"></script>
</body>
</html>
