    <div class="admin-header-actions">
      <a href="../index.html" class="admin-btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flip-x"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        العودة للموقع
      </a>
      <button class="admin-btn-ghost" id="adminLogoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        خروج
      </button>
    </div>
  </div>
  <nav class="admin-tabs container">
    <a href="dashboard.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      الإحصائيات
    </a>
    <a href="orders.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      الطلبات
    </a>
    <a href="products.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      المنتجات
    </a>
    <a href="offers.html" class="admin-tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      العروض
    </a>
    <a href="categories.html" class="admin-tab active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>
      الفئات
    </a>
    <a href="settings.html" class="admin-tab">

      الإعدادات
    </a>
  </nav>
</header>

<main class="container admin-main">
  <div class="admin-page-head">
    <h1>الفئات</h1>
    <p class="text-faint">أضف وعدّل وحذف فئات المنتجات — تظهر تلقائياً في المتجر ونموذج إضافة المنتجات</p>
  </div>

  <button class="add-new-btn" id="addCatBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    إضافة فئة جديدة
  </button>

  <!-- نموذج إضافة/تعديل -->
  <div id="catForm" class="panel" style="display:none; max-width:560px; margin-bottom:24px;">
    <h3 id="catFormTitle" style="font-size:15px; margin-bottom:18px;">فئة جديدة</h3>
    <div class="field-row">
      <div class="field">
        <label>الاسم (عربي) <span class="req">*</span></label>
        <input type="text" id="catAr" placeholder="مثال: بروتين">
      </div>
      <div class="field">
        <label>الاسم (فرنسي) <span class="req">*</span></label>
        <input type="text" id="catFr" placeholder="ex: Protéine">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>المعرّف (ID) <span class="req">*</span></label>
        <input type="text" id="catId" placeholder="مثال: protein" style="direction:ltr;">
        <p class="text-faint" style="font-size:11.5px; margin-top:4px;">حروف إنجليزية صغيرة وشرطات فقط. لا يتغير بعد الحفظ.</p>
      </div>
      <div class="field">
        <label>أيقونة (emoji — اختياري)</label>
        <input type="text" id="catIcon" placeholder="مثال: 💪" style="font-size:22px; text-align:center;">
      </div>
    </div>
    <div class="field-error-msg" id="catError" style="display:none; margin-bottom:12px;"></div>
    <div class="form-actions">
      <button class="btn btn-primary" id="saveCatBtn">حفظ الفئة</button>
      <button class="btn btn-outline" id="cancelCatBtn">إلغاء</button>
    </div>
  </div>

  <!-- قائمة الفئات -->
  <div id="catList">
    <p class="empty-note">جاري التحميل...</p>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/admin-categories.js"></script>
</body>
</html>
